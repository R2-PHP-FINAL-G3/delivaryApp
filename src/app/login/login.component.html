<section class="vh-100 gradient-custom">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card bg-light  text-success" style="border-radius: 1rem;">
          <div class="card-body p-5 text-center">


            <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
              <h2 class="fw-bold mb-2 text-uppercase">Login</h2>
              <p class="text-success-50 mb-5">Please enter your login and password!</p>

              <div class="form-outline form-success mb-4">

                <label>
                  User Name:
                </label>
                <input type="text" formControlName="userName">

                <div *ngIf="userName.touched && userName.invalid">
                  <div class="form-text text-danger" *ngIf="userName?.errors?.['required']">
                    This field is required
                  </div>

                  <!-- <div
      class="form-text text-danger"
      *ngIf="userName?.errors?.['pattern']"
    >
      email must have speciacharacter[$or*or#or@] ,one character at least
    </div> -->
                </div>


              </div>

              <br>


              <!-- <label> -->
              <!-- Email:
             <input type="email" formControlName="email">
               </label> -->


              <div class="form-outline form-success mb-4">
                <label>
                  Password:
                  <input type="password" formControlName="password" name="password">
                </label>

                <div>
                  <div *ngIf="password.touched && password.invalid">

                  <div class="form-text text-danger" *ngIf="password?.errors?.['required']">
                    This field is required
                  </div>
                </div>

              </div>
              <br>
              <button type="submit" class="btn btn-success">Submit</button>
            </form>
